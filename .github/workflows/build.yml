name: Build Binary
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: 'stable'
      - run: nim c -d:release --app:console tickterm.nim
      - uses: actions/upload-artifact@v4
        with:
          name: tickterm-linux
          path: tickterm
